<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Goggins System</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="#">

                🔥 GOGGINS SYSTEM

            </a>

            <div class="ms-auto d-flex align-items-center">

                <span
                    id="todayDate"
                    class="text-white me-3">
                </span>

                <button
                    id="themeBtn"
                    class="btn btn-outline-light btn-sm">

                    <i class="bi bi-moon-fill"></i>

                </button>

            </div>

        </div>

    </nav>

    <!-- ================= MAIN ================= -->

    <div class="container mt-4">

        <!-- Welcome -->

        <div class="card shadow border-0 mb-4">

            <div class="card-body">

                <h2 class="fw-bold">

                    Stay Hard.

                </h2>

                <p class="text-muted">

                    Build discipline every single day.

                </p>

                <blockquote
                    id="quote"
                    class="blockquote fs-6">

                </blockquote>

            </div>

        </div>

        <!-- Dashboard -->

        <div class="row g-3">

            <div class="col-md-3">

                <div class="card dashboard-card">

                    <div class="card-body text-center">

                        <h6>Total Missions</h6>

                        <h2 id="totalMission">

                            0

                        </h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card dashboard-card">

                    <div class="card-body text-center">

                        <h6>Completed</h6>

                        <h2
                            id="completedMission">

                            0

                        </h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card dashboard-card">

                    <div class="card-body text-center">

                        <h6>Pending</h6>

                        <h2
                            id="pendingMission">

                            0

                        </h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card dashboard-card">

                    <div class="card-body text-center">

                        <h6>Completion</h6>

                        <h2
                            id="percentage">

                            0%

                        </h2>

                    </div>

                </div>

            </div>

        </div>

        <!-- Progress -->

        <div class="progress mt-4"
            style="height:25px;">

            <div
                id="progressBar"
                class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                style="width:0%;">

                0%

            </div>

        </div>

        <!-- Add Mission -->

        <div class="card shadow mt-5">

            <div class="card-header bg-primary text-white">

                <h4>

                    Add New Mission

                </h4>

            </div>

            <div class="card-body">

                <form
                    id="missionForm">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>

                                Mission Title

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="title">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>

                                Deadline

                            </label>

                            <input
                                type="date"
                                class="form-control"
                                id="deadline">

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-4 mb-3">

                            <label>

                                Category

                            </label>

                            <select
                                id="category"
                                class="form-select">

                                <option>Workout</option>

                                <option>Coding</option>

                                <option>College</option>

                                <option>Reading</option>

                                <option>Diet</option>

                                <option>Finance</option>

                                <option>Meditation</option>

                                <option>Other</option>

                            </select>

                        </div>

                        <div class="col-md-4 mb-3">

                            <label>

                                Priority

                            </label>

                            <select
                                id="priority"
                                class="form-select">

                                <option>High</option>

                                <option>Medium</option>

                                <option>Low</option>

                            </select>

                        </div>

                        <div class="col-md-4 mb-3">

                            <label>

                                Status

                            </label>

                            <select
                                id="status"
                                class="form-select">

                                <option>Pending</option>

                                <option>Completed</option>

                            </select>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label>

                            Notes

                        </label>

                        <textarea
                            id="notes"
                            class="form-control"
                            rows="3"></textarea>

                    </div>

                    <button
                        class="btn btn-success"
                        type="submit">

                        <i class="bi bi-plus-circle"></i>

                        Add Mission

                    </button>

                    <button
                        type="reset"
                        class="btn btn-secondary">

                        Reset

                    </button>

                </form>

            </div>

        </div>

        <!-- Search -->

        <div class="row mt-5">

            <div class="col-md-8">

                <input
                    type="text"
                    id="search"
                    class="form-control"
                    placeholder="Search mission...">

            </div>

            <div class="col-md-4">

                <select
                    id="filter"
                    class="form-select">

                    <option value="All">

                        All

                    </option>

                    <option value="Completed">

                        Completed

                    </option>

                    <option value="Pending">

                        Pending

                    </option>

                    <option value="High">

                        High Priority

                    </option>

                </select>

            </div>

        </div>

        <!-- Mission Table -->

        <div class="card shadow mt-4 mb-5">

            <div class="card-header bg-dark text-white">

                <h4>

                    Today's Missions

                </h4>

            </div>

            <div class="table-responsive">

                <table class="table table-hover">

                    <thead class="table-light">

                        <tr>

                            <th>#</th>

                            <th>Mission</th>

                            <th>Category</th>

                            <th>Priority</th>

                            <th>Status</th>

                            <th>Deadline</th>

                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="missionTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->

    <script src="script.js"></script>

</body>

</html>
